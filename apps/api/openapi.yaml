components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    StoreId:
      name: id
      in: path
      required: true
      schema:
        type: string
    StoreID:
      name: storeID
      in: path
      required: true
      schema:
        type: string
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: string
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
    LeadId:
      name: id
      in: path
      required: true
      schema:
        type: string
    Slug:
      name: slug
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Номер страницы (по умолчанию 1)
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Размер страницы (макс. 100)
    AnalyticsPeriod:
      name: period
      in: query
      schema:
        type: integer
        enum: [7, 30, 90]
        default: 7
      description: Окно аналитики в днях

  schemas:
    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: bazar-ai-api
        version:
          type: string
          description: Версия сборки (например dev или git tag)
          example: dev
    ReadyOKResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ready]
    ReadyNotReadyResponse:
      type: object
      required: [status, database]
      properties:
        status:
          type: string
          enum: [not_ready]
        database:
          type: string
          example: unavailable
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Коды из API, например validation_error, unauthorized, forbidden, not_found,
                conflict, quota_exceeded, rate_limited, payload_too_large, upstream_error, internal_error.
            message:
              type: string
            request_id:
              type: string

    AuthRegisterRequest:
      type: object
      description: Нужен хотя бы один из `email` / `phone`; пароль ≥8 символов, буквы и цифры.
      properties:
        phone:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    AuthLoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          description: Email или телефон
        password:
          type: string
    AuthRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
        device_id:
          type: string
          description: Должен совпадать с привязкой токена, если использовался при выдаче
    AuthLogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
        all:
          type: boolean
          description: Если true — отозвать все сессии (нужен Bearer)

    OnboardingCompleteRequest:
      type: object
      properties:
        niche:
          type: string
        name:
          type: string
        region:
          type: string
        city:
          type: string
        style:
          type: string
        contacts:
          $ref: "#/components/schemas/Contacts"

    StoreCreateRequest:
      allOf:
        - $ref: "#/components/schemas/Store"
      description: |
        Декод как [platform.Store](internal/platform). `owner_id` в теле перезаписывается из JWT.
        Сервер валидирует имя и контакты.

    ProductWriteRequest:
      allOf:
        - $ref: "#/components/schemas/Product"
      description: |
        При создании `store_id` берётся из path. Идентификаторы и slug на стороне сервера при создании могут игнорироваться/пересчитываться в зависимости от репозитория.

    OrderCreateRequest:
      allOf:
        - $ref: "#/components/schemas/Order"
      description: |
        `store_id` подставляется из витрины; клиент передаёт покупателя, позиции и суммы. `Idempotency-Key` — HTTP-заголовок.

    AIGenerateRequest:
      type: object
      properties:
        user_id:
          type: string
          description: По умолчанию — из JWT
        store_id:
          type: string
        input:
          type: string
          description: Промпт / контекст генерации

    SprintOnboardingCreateRequest:
      type: object
      required: [name, niche, city, region, style, contacts]
      properties:
        name:
          type: string
        niche:
          type: string
        city:
          type: string
        region:
          type: string
        style:
          type: string
        contacts:
          $ref: "#/components/schemas/Contacts"
      description: Хотя бы один из phone / whatsapp / telegram в contacts

    DashboardLeadStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, contacted, closed]

    DashboardLeadCommentRequest:
      type: object
      required: [comment]
      properties:
        comment:
          type: string
          maxLength: 1000

    SprintLeadCreateRequest:
      type: object
      required: [customerName, phone]
      properties:
        customerName:
          type: string
        phone:
          type: string
        message:
          type: string

    TelegramWebhookUpdate:
      type: object
      description: Упрощённая схема Telegram Update (обрабатывается ветка message.text)
      properties:
        message:
          type: object
          properties:
            text:
              type: string
            chat:
              type: object
              properties:
                id:
                  type: integer
                  format: int64
            from:
              type: object
              properties:
                id:
                  type: integer
                  format: int64
      additionalProperties: true

    AuthTokenWithUser:
      type: object
      required: [user, access_token, refresh_token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        access_token:
          type: string
        refresh_token:
          type: string
    AuthTokenPair:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    LoggedOutStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: logged_out
    UserWrapped:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      properties:
        id:
          type: string
        phone:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Contacts:
      type: object
      properties:
        phone: { type: string }
        whatsapp: { type: string }
        telegram: { type: string }
        instagram: { type: string }
        address: { type: string }
        schedule: { type: string }
    Store:
      type: object
      properties:
        id: { type: string }
        owner_id: { type: string }
        name: { type: string }
        slug: { type: string }
        niche: { type: string }
        description: { type: string }
        region: { type: string }
        city: { type: string }
        currency: { type: string }
        status: { type: string }
        tariff: { type: string }
        theme: { type: string }
        style: { type: string }
        contacts:
          $ref: "#/components/schemas/Contacts"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    OnboardingCompleteResponse:
      type: object
      required: [store, public_url]
      properties:
        store:
          $ref: "#/components/schemas/Store"
        public_url:
          type: string
          description: Абсолютный URL витрины
    PublicStorefront:
      type: object
      required: [store, products, seo]
      properties:
        store:
          $ref: "#/components/schemas/Store"
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        seo:
          type: object
          properties:
            title: { type: string }
            description: { type: string }
    SprintPublicStore:
      type: object
      required: [store, products]
      properties:
        store:
          $ref: "#/components/schemas/Store"
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
    SprintOnboardingCreateResponse:
      type: object
      required: [store, guest_mode]
      properties:
        store:
          $ref: "#/components/schemas/Store"
        guest_mode:
          type: boolean

    OrderItem:
      type: object
      properties:
        product_id: { type: string }
        title: { type: string }
        quantity: { type: integer }
        price: { type: integer, format: int64 }
        total: { type: integer, format: int64 }
    Order:
      type: object
      properties:
        id: { type: string }
        store_id: { type: string }
        idempotency_key: { type: string }
        status: { type: string }
        payment_status: { type: string }
        delivery_status: { type: string }
        customer_name: { type: string }
        customer_phone: { type: string }
        customer_city: { type: string }
        customer_address: { type: string }
        comment: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total_amount: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }

    Product:
      type: object
      properties:
        id: { type: string }
        store_id: { type: string }
        category_id: { type: string }
        title: { type: string }
        slug: { type: string }
        description: { type: string }
        short_description: { type: string }
        price: { type: integer, format: int64 }
        old_price: { type: integer, format: int64 }
        currency: { type: string }
        images:
          type: array
          items: { type: string }
        image: { type: string }
        stock_quantity: { type: integer }
        featured: { type: boolean }
        sku: { type: string }
        status: { type: string }
        attributes:
          type: object
          additionalProperties: { type: string }
        seo_title: { type: string }
        seo_description: { type: string }
        created_at: { type: string, format: date-time }
    ProductDeletedStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: deleted

    Pagination:
      type: object
      required: [page, limit]
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
    ListResponseStores:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Store"
        meta:
          $ref: "#/components/schemas/Pagination"
    ListResponseProducts:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        meta:
          $ref: "#/components/schemas/Pagination"
    ListResponseOrders:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        meta:
          $ref: "#/components/schemas/Pagination"

    ImageUploadResult:
      type: object
      required: [url, preview_url, mime, filename, max_size]
      properties:
        url: { type: string }
        preview_url: { type: string }
        mime: { type: string }
        filename: { type: string }
        max_size:
          type: integer
          description: Максимальный размер в байтах (5 MiB)

    NotificationJob:
      type: object
      properties:
        id: { type: string }
        store_id: { type: string }
        order_id: { type: string }
        channel: { type: string }
        status: { type: string }
        payload: { type: string }
        created_at: { type: string, format: date-time }

    TelegramConnectCodeResponse:
      type: object
      required: [code, expires_at, instruction]
      properties:
        code: { type: string }
        expires_at: { type: string, format: date-time }
        instruction: { type: string }
    TelegramConnection:
      type: object
      properties:
        code: { type: string }
        user_id: { type: string }
        store_id: { type: string }
        telegram_id: { type: string }
        status: { type: string }
        expires_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    TelegramNotConnected:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [not_connected]
    TelegramTestSent:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [sent]
    TelegramWebhookAck:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [connected, ignored]

    AIGeneration:
      type: object
      properties:
        id: { type: string }
        user_id: { type: string }
        store_id: { type: string }
        type: { type: string }
        input: { type: string }
        output: { type: string }
        tokens_used: { type: integer }
        provider: { type: string }
        status: { type: string }
        cost: { type: number, format: double }
        created_at: { type: string, format: date-time }

    AdminStats:
      type: object
      properties:
        stores: { type: integer }
        active_stores: { type: integer }
        orders: { type: integer }
        gmv: { type: integer, format: int64 }
        mrr: { type: integer }
        ai_usage: { type: string }

    LeadStatusEvent:
      type: object
      properties:
        id: { type: string }
        lead_id: { type: string }
        from_status: { type: string }
        to_status: { type: string }
        created_at: { type: string, format: date-time }
    Lead:
      type: object
      properties:
        id: { type: string }
        store_id: { type: string }
        customer_name: { type: string }
        phone: { type: string }
        message: { type: string }
        manager_comment: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        status_history:
          type: array
          items:
            $ref: "#/components/schemas/LeadStatusEvent"
    DashboardLeadsResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        meta:
          type: object
          properties:
            total: { type: integer }
    DashboardAnalyticsData:
      type: object
      properties:
        stores: { type: integer }
        leads: { type: integer }
        orders: { type: integer }
        gmv: { type: integer, format: int64 }
        period: { type: integer, description: "Дней: 7, 30 или 90" }
        series:
          type: array
          items:
            type: object
            properties:
              date: { type: string, example: "2026-05-01" }
              leads: { type: integer }
              orders: { type: integer }
              gmv: { type: integer, format: int64 }
    DashboardAnalyticsResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/DashboardAnalyticsData"

  responses:
    ValidationError:
      description: Невалидное тело или бизнес-валидация
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: validation_error
              message: invalid payload
    Unauthorized:
      description: Нет или неверный Bearer / сессия
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: unauthorized
              message: missing token
    Forbidden:
      description: Недостаточно прав или CORS origin
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: forbidden
              message: insufficient role
    NotFound:
      description: Сущность не найдена
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: not_found
              message: resource not found
    Conflict:
      description: Конфликт (например пользователь уже есть)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: conflict
              message: user already exists or payload is invalid
    QuotaExceeded:
      description: Лимит тарифа (HTTP 402 Payment Required в коде API)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: quota_exceeded
              message: product limit exceeded for tariff free
    TooManyRequests:
      description: Rate limit 120/мин на IP
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: rate_limited
              message: rate limit exceeded
    BadGateway:
      description: Ошибка внешнего провайдера (AI, Telegram send)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: upstream_error
              message: ai provider failed
    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: internal_error
              message: unexpected server error
    PayloadTooLarge:
      description: Тело запроса превышает лимит (см. API_MAX_BODY_BYTES); для multipart действуют лимиты обработчика.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            error:
              code: payload_too_large
              message: request body too large
