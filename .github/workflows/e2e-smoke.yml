name: E2E Smoke

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  alpha-flow:
    name: Alpha Flow
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Create dev env
        run: make env-init
      - name: Start stack
        run: make up
      - name: Run API smoke flow
        run: docker compose --env-file deployments/env/dev.env -f deployments/docker-compose.yml exec -T frontend sh -c "E2E_API_URL=http://api:8080 npm run e2e"
      - name: Dump logs on failure
        if: failure()
        run: docker compose --env-file deployments/env/dev.env -f deployments/docker-compose.yml logs --tail=200
      - name: Stop stack
        if: always()
        run: docker compose --env-file deployments/env/dev.env -f deployments/docker-compose.yml down -v
